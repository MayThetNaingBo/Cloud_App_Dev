<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Task Management App</title>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
            integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
            crossorigin="anonymous"
        />
        <script
            src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
            integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js"
            integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js"
            integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://kit.fontawesome.com/c40c131336.js"
            crossorigin="anonymous"
        ></script>
        <link
            href="https://fonts.googleapis.com/css?family=Poppins:400,700|Roboto:400,700&display=swap"
            rel="stylesheet"
        />

        <script src="authentication.js"></script>
        <style>
            body {
                background-image: url("images/welcome\ page.jpg");
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                background-attachment: fixed;
            }
            .navbar {
                background-color: black;
            }
            .navbar-nav .nav-link {
                color: white;
            }
            .navbar-nav .nav-item {
                margin-right: 15px;
            }
            .form-container {
                background-color: #fff;
                padding: 20px;
                border-radius: 15px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
                max-width: 500px;
                margin: auto;
            }
            .form-container h2 {
                font-family: "Poppins", sans-serif;
                font-weight: 700;
                margin-bottom: 20px;
            }
            .form-container .form-control {
                margin-bottom: 15px;
                border-radius: 25px;
                padding: 15px;
            }
            .form-container .btn-primary {
                background-color: #00c6ff;
                border: none;
                padding: 10px 20px;
                border-radius: 25px;
                font-size: 16px;
                font-weight: 700;
                width: 100%;
            }
            .form-container textarea.form-control {
                height: 120px;
                resize: none;
            }
            .jobs {
                margin-top: 20px;
            }
            .jobs h2 {
                text-align: center;
                width: 100%;
                margin-bottom: 20px;
            }
            @media (max-width: 767.98px) {
                .navbar {
                    background-color: white;
                }
                .navbar-nav .nav-link {
                    color: black;
                }
            }
        </style>
    </head>

    <body onload="getTask()">
        <nav class="container-fluid navbar navbar-expand-md">
            <button
                class="navbar-toggler"
                type="button"
                data-toggle="collapse"
                data-target="#navContent"
            >
                <i class="fa-sharp fa-solid fa-bars"></i>
            </button>
            <div class="collapse navbar-collapse ml-auto" id="navContent">
                <div>
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html"
                                ><span class="fa fa-home"></span> Home</a
                            >
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="add.html"
                                ><span class="fa fa-tasks"></span> Add Task</a
                            >
                        </li>
                        <li class="nav-item">
                            <button
                                class="btn btn-link nav-link"
                                onclick="user_logout()"
                            >
                                <span
                                    class="fa-sharp fa-solid fa-sign-out"
                                ></span>
                                Logout
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="row jobs">
                <h2>Tasks Available</h2>
            </div>
            <div class="row" id="taskList"></div>
        </div>
        <script src="main.js"></script>
    </body>
</html>
