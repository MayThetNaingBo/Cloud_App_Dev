<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Update A Group Task</title>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
            integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
            crossorigin="anonymous"
        />
        <script
            src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
            integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js"
            integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js"
            integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://kit.fontawesome.com/c40c131336.js"
            crossorigin="anonymous"
        ></script>
        <link
            href="https://fonts.googleapis.com/css?family=Poppins:400,700|Roboto:400,700&display=swap"
            rel="stylesheet"
        />

        <style>
            body {
                background-image: url("images/welcome\ page.jpg");
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                background-attachment: fixed;
            }
            .navbar {
                background-color: black;
            }
            .navbar-nav .nav-link {
                color: white;
            }
            .form-container {
                background-color: #fff;
                padding: 20px;
                border-radius: 15px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
                max-width: 500px;
                margin: auto;
            }
            .form-container h2 {
                font-family: "Poppins", sans-serif;
                margin-bottom: 20px;
            }
            .form-container .form-control {
                margin-bottom: 15px;
                border-radius: 20px;
                padding: 15px;
            }
            .form-container .btn-primary {
                background-color: #00c6ff;
                border: none;
                padding: 10px 20px;
                border-radius: 20px;
                font-size: 16px;
                font-weight: 700;
                width: 100%;
            }
            .form-container textarea.form-control {
                height: 120px;
                resize: none;
            }
        </style>
        <script src="main.js"></script>
    </head>
    <body onload="loadTask()">
        <nav class="navbar navbar-expand-md">
            <button
                class="navbar-toggler"
                type="button"
                data-toggle="collapse"
                data-target="#navContent"
            >
                <i class="fa-sharp fa-solid fa-bars"></i>
            </button>
            <div class="collapse navbar-collapse" id="navContent">
                <ul class="navbar-nav mr-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html"
                            ><span class="fa fa-home"></span> Home</a
                        >
                    </li>
                </ul>
            </div>
        </nav>
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="form-container" role="main">
                        <h2>Update A Group Task</h2>
                        <form
                            id="updateTaskForm"
                            role="form"
                            aria-labelledby="formTitle"
                            onsubmit="event.preventDefault(); updateTask();"
                        >
                            <div class="form-group">
                                <textarea
                                    id="gptask_description"
                                    class="form-control"
                                    placeholder="Enter group description"
                                    name="description"
                                    required
                                    aria-label="Description"
                                ></textarea>
                            </div>
                            <div class="form-group">
                                <select
                                    id="gptask_status"
                                    class="custom-select"
                                    name="gptask_status"
                                    required
                                    aria-label="Status"
                                >
                                    <option value="" selected disabled hidden>
                                        Status
                                    </option>
                                    <option value="completed">Completed</option>
                                    <option value="in-progress">
                                        In Progress
                                    </option>
                                    <option value="not-started">
                                        Haven't Started
                                    </option>
                                </select>
                            </div>
                            <div class="form-group">
                                <input
                                    id="gptask_deadline"
                                    type="date"
                                    class="form-control"
                                    name="deadline"
                                    required
                                    aria-label="Deadline"
                                />
                            </div>
                            <button type="submit" class="btn btn-primary">
                                Update Group Task
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
